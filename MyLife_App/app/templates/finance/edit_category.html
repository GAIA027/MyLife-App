<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Edit Category</title></head>
<body>
<h1>Edit Category</h1>
{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">
    <input type="text" name="name" value="{{ category['name'] if category else '' }}" required>
    <input type="text" name="category_type" value="{{ category['type'] if category else '' }}" required>
    <button type="submit">Save</button>
</form>
</body>
</html>
