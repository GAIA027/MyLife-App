<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Accounts</title></head>
<body>
<h1>Accounts</h1>
{% if not accounts %}<p>No accounts found.</p>{% else %}
<ul>{% for account in accounts %}<li>{{ account["account_name"] }} | {{ account["account_type"] }} | {{ account["currency"] }}</li>{% endfor %}</ul>
{% endif %}
</body>
</html>
